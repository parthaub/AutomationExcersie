# ============================================================
# config.properties
# This file holds all configuration values for our tests.
# We read these values in ConfigReader.java
# Never hardcode URLs or credentials directly in test code!
# ============================================================

# The website we are testing
base.url=https://automationexercise.com

# Which browser to use: chrome, firefox, edge
browser=chrome

# How long Selenium waits (in seconds) before giving up finding an element
implicit.wait=10
explicit.wait=20

# Base URL for the REST API
api.base.url=https://automationexercise.com/api

# Where to save the Extent HTML report
extent.report.path=test-output/ExtentReport.html

# Where to save screenshots on failure
screenshot.path=test-output/screenshots/
